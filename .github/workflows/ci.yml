name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── Fast gate: format, lint, and the CPU-reference + integration tests. ──
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build deps (winit/egui, needed to compile the viewer)
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features
      - name: Test (CPU reference + integration)
        run: cargo test --workspace

  # ── GPU path: wgpu / CPU≡GPU tests under lavapipe (software Vulkan). ──
  # Non-blocking: real GPU differs from lavapipe, so this is a signal, not a gate.
  gpu:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      WGPU_BACKEND: vulkan
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Software Vulkan (lavapipe) + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools libvulkan1 libxkbcommon-dev libwayland-dev libx11-dev
          echo "Installed ICDs:"; ls -l /usr/share/vulkan/icd.d/ || true
          # Point the loader at the lavapipe ICD by its actual installed name (path/name varies by
          # release); fall back to the loader's default discovery if the glob finds nothing.
          ICD=$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1)
          if [ -n "$ICD" ]; then
            echo "using lavapipe ICD: $ICD"
            echo "VK_ICD_FILENAMES=$ICD" >> "$GITHUB_ENV"
            echo "VK_DRIVER_FILES=$ICD" >> "$GITHUB_ENV"
          else
            echo "no lavapipe ICD glob match; relying on loader auto-discovery"
          fi
      - name: Sanity — an ICD is present
        run: vulkaninfo --summary || true
      - name: GPU-marked tests (ignored by default)
        run: cargo test --workspace -- --ignored

  # ── SDK: build the PyO3 extension and run the Python fidelity tests. ──
  # Until M7 creates crates/sdk/pyproject.toml, the extension steps are skipped and the job exits
  # cleanly ("no sdk yet"). hashFiles is not available in a job-level `if`, so the gate is a first
  # step whose output guards the rest.
  python:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - id: sdk
        name: Is the PyO3 extension present yet?
        run: |
          if [ -f crates/sdk/pyproject.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "no sdk yet — skipping the Python fidelity tests."
          fi
      - if: steps.sdk.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: steps.sdk.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
      - if: steps.sdk.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: steps.sdk.outputs.present == 'true'
        name: Install maturin, pytest, torch (CPU)
        run: pip install maturin pytest torch --extra-index-url https://download.pytorch.org/whl/cpu
      - if: steps.sdk.outputs.present == 'true'
        name: Build the extension into a venv (maturin develop needs a venv/conda env)
        run: |
          python -m venv --system-site-packages .venv
          . .venv/bin/activate
          maturin develop --manifest-path crates/sdk/Cargo.toml
      - if: steps.sdk.outputs.present == 'true'
        name: pytest
        # The venv's python explicitly — a bare `pytest` resolves to the system binary, whose
        # sys.path excludes the venv where `cavendish` was installed.
        run: .venv/bin/python -m pytest python/tests -q

  # ── Packaging gate (distinct axis from the fidelity `python` job): build distributable wheels on
  # both target platforms. A green build here proves the extension compiles and links on each OS —
  # macOS-arm64 is the MPS/CPU path R7 exists to catch, linux-x64 the CPU path. Separate from
  # `python` so a review can tell a packaging failure from a fidelity failure.
  #
  # CUDA is feature-gated-out and deferred: `generate::run` is CPU-only, so no bundle is
  # device-resident (nothing to hand off zero-copy), and there is no CUDA runner to build or exercise
  # it. The DLPack layer is device-general and ready to carry CUDA once the GPU path is wired into
  # `generate::run` — at which point a CUDA-feature wheel is added here.
  wheels:
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-14
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.os == 'ubuntu-latest'
        name: Build deps (wgpu/compute is in the dependency graph)
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev
      - name: Install maturin
        run: pip install maturin
      - name: Build the wheel (default features — CPU/MPS)
        run: maturin build --release --manifest-path crates/sdk/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: target/wheels/*.whl

  # ── Spec: compile the LaTeX and keep the PDF as an artefact. ──
  spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile cavendish.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cavendish.tex
          working_directory: cavendish-spec
          latexmk_use_lualatex: false
      - uses: actions/upload-artifact@v4
        with:
          name: cavendish-spec
          path: cavendish-spec/cavendish.pdf
      - name: Upload the latexmk log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cavendish-spec-log
          path: cavendish-spec/cavendish.log
          if-no-files-found: ignore
