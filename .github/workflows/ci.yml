name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── Fast gate: format, lint, and the CPU-reference + integration tests. ──
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build deps (winit/egui, needed to compile the viewer)
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features
      - name: Test (CPU reference + integration)
        run: cargo test --workspace

  # ── GPU path: wgpu / CPU≡GPU tests under lavapipe (software Vulkan). ──
  # Non-blocking: real GPU differs from lavapipe, so this is a signal, not a gate.
  gpu:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
      WGPU_BACKEND: vulkan
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Software Vulkan (lavapipe) + build deps
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers vulkan-tools libxkbcommon-dev libwayland-dev libx11-dev
      - name: Sanity — an ICD is present
        run: vulkaninfo --summary || true
      - name: GPU-marked tests (ignored by default)
        run: cargo test --workspace -- --ignored

  # ── SDK: build the PyO3 extension and run the Python fidelity tests. ──
  python:
    runs-on: ubuntu-latest
    # Skipped until M7 creates crates/sdk/pyproject.toml (the PyO3 extension).
    if: ${{ hashFiles('crates/sdk/pyproject.toml') != '' }}
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install maturin, pytest, torch (CPU)
        run: pip install maturin pytest torch --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Build the extension into the env
        run: maturin develop --manifest-path crates/sdk/Cargo.toml
      - name: pytest
        run: pytest python/tests -q

  # ── Spec: compile the LaTeX and keep the PDF as an artefact. ──
  spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile cavendish.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cavendish.tex
          working_directory: cavendish-spec
          latexmk_use_lualatex: false
      - uses: actions/upload-artifact@v4
        with:
          name: cavendish-spec
          path: cavendish-spec/cavendish.pdf
      - name: Upload the latexmk log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cavendish-spec-log
          path: cavendish-spec/cavendish.log
          if-no-files-found: ignore
